<style>
:root{
  --crimson:#A6192E;
  --crimson-dark:#7E1122;
  --ink:#1B1918;
  --ink-soft:#4A4642;
  --paper:#EEEAE0;
  --paper-hi:#F8F6F0;
  --line:#D6D0C0;
  --gold:#B8863B;
  --green:#2E6B4F;
  --white:#ffffff;
  --radius:2px;
  --serif:'Noto Serif Devanagari','Noto Serif',serif;
  --sans:'Noto Sans Devanagari','Inter',sans-serif;
  --ui:'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none;}
img{max-width:100%;display:block;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:var(--ui);}
::selection{background:var(--crimson);color:#fff;}

/* ===== Utility ===== */
.container{max-width:1180px;margin:0 auto;padding:0 18px;}
.hide{display:none !important;}
.eyebrow{
  font-family:var(--ui);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--crimson);font-weight:700;
}
.hr{height:1px;background:var(--line);border:0;margin:0;}
.badge{
  display:inline-flex;align-items:center;gap:4px;font-family:var(--ui);font-size:10.5px;
  font-weight:700;letter-spacing:.04em;padding:3px 7px;border-radius:2px;text-transform:uppercase;
}
.badge-breaking{background:var(--crimson);color:#fff;}
.badge-featured{background:var(--gold);color:#2b1e08;}
.badge-trending{background:var(--ink);color:#fff;}
.badge-pick{background:var(--green);color:#fff;}
.badge-draft{background:#e4ddc8;color:#6b5f3f;}
.badge-scheduled{background:#dbe6f2;color:#274a70;}
.badge-published{background:#deefe4;color:#1d5a3a;}

/* ===== Dateline stamp (signature element) ===== */
.stamp{
  display:inline-flex;align-items:center;gap:6px;
  border:1.5px dashed var(--crimson-dark);
  color:var(--crimson-dark);
  font-family:var(--mono);
  font-size:10.5px;letter-spacing:.03em;
  padding:3px 8px;transform:rotate(-2deg);
  background:rgba(166,25,46,0.04);
  white-space:nowrap;
}
.stamp b{font-weight:700;}

/* ===== Masthead ===== */
.ticker-bar{background:var(--ink);color:#fff;font-family:var(--ui);font-size:12.5px;}
.ticker-bar .container{display:flex;align-items:center;gap:12px;height:34px;}
.ticker-tag{background:var(--crimson);padding:3px 8px;font-weight:800;letter-spacing:.06em;font-size:10.5px;flex-shrink:0;}
.ticker-track{overflow:hidden;flex:1;white-space:nowrap;position:relative;height:16px;}
.ticker-items{display:inline-flex;gap:48px;animation:ticker 26s linear infinite;position:absolute;}
@keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}
@media (prefers-reduced-motion: reduce){.ticker-items{animation:none;}}
.ticker-time{font-family:var(--mono);color:#b9b3a6;flex-shrink:0;}

.masthead{background:var(--paper-hi);border-bottom:3px solid var(--ink);}
.masthead-inner{display:flex;align-items:center;justify-content:space-between;padding:20px 0 14px;}
.logo{font-family:var(--serif);font-weight:800;font-size:40px;letter-spacing:-.01em;color:var(--ink);}
.logo span{color:var(--crimson);}
.logo-sub{font-family:var(--ui);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);margin-top:2px;}
.masthead-right{display:flex;align-items:center;gap:16px;font-family:var(--ui);font-size:12px;color:var(--ink-soft);}
.date-block{text-align:right;line-height:1.4;}
.admin-link{border:1px solid var(--ink);padding:7px 14px;font-weight:700;font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;}
.admin-link:hover{background:var(--ink);color:#fff;}

nav.catnav{background:var(--ink);position:sticky;top:0;z-index:40;}
.catnav .container{display:flex;overflow-x:auto;scrollbar-width:none;}
.catnav .container::-webkit-scrollbar{display:none;}
.catnav a{
  color:#e8e5dd;font-family:var(--sans);font-weight:600;font-size:14px;
  padding:12px 14px;white-space:nowrap;border-bottom:3px solid transparent;flex-shrink:0;
}
.catnav a:hover, .catnav a.active{color:#fff;border-bottom-color:var(--crimson);background:rgba(255,255,255,.04);}

/* ===== Layout grid ===== */
.layout{display:grid;grid-template-columns:1fr 320px;gap:34px;padding:28px 0 60px;}
@media (max-width:920px){.layout{grid-template-columns:1fr;}}

/* ===== Hero slider ===== */
.hero{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:34px;}
@media (max-width:700px){.hero{grid-template-columns:1fr;}}
.hero-main{position:relative;background:var(--ink);color:#fff;min-height:400px;overflow:hidden;}
.hero-main img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.55;}
.hero-main-content{position:relative;padding:24px;display:flex;flex-direction:column;justify-content:flex-end;height:100%;min-height:400px;}
.hero-cat{color:var(--crimson);}
.hero-title{font-family:var(--serif);font-size:30px;line-height:1.2;font-weight:700;margin:10px 0 8px;}
.hero-meta{font-family:var(--ui);font-size:12px;color:#d8d3c5;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.hero-side{display:flex;flex-direction:column;gap:14px;}
.hero-side-item{display:flex;gap:12px;border-bottom:1px solid var(--line);padding-bottom:14px;}
.hero-side-item:last-child{border:0;}
.hero-side-item img{width:100px;height:74px;object-fit:cover;flex-shrink:0;}
.hero-side-title{font-family:var(--serif);font-weight:700;font-size:15.5px;line-height:1.3;}

/* ===== Section headers ===== */
.sec-head{display:flex;align-items:baseline;justify-content:space-between;border-bottom:2px solid var(--ink);margin-bottom:16px;padding-bottom:8px;}
.sec-head h2{font-family:var(--serif);font-size:22px;margin:0;font-weight:700;}
.sec-head .view-all{font-family:var(--ui);font-size:12px;font-weight:700;color:var(--crimson);text-transform:uppercase;letter-spacing:.04em;}

.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:40px;}
@media (max-width:820px){.news-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:560px){.news-grid{grid-template-columns:1fr;}}
.card{border-bottom:1px solid var(--line);padding-bottom:14px;}
.card img{width:100%;height:150px;object-fit:cover;margin-bottom:10px;background:#ddd;}
.card-title{font-family:var(--serif);font-weight:700;font-size:16.5px;line-height:1.32;margin:0 0 6px;}
.card-summary{font-size:13.5px;color:var(--ink-soft);line-height:1.5;margin-bottom:8px;}
.card-foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.card-meta{font-family:var(--ui);font-size:11px;color:#8a8478;}

/* ===== Sidebar ===== */
.side-block{margin-bottom:32px;}
.side-title{font-family:var(--ui);font-weight:800;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--ink);padding:9px 12px;}
.side-list{background:var(--paper-hi);border:1px solid var(--line);border-top:0;}
.side-item{display:flex;gap:10px;padding:12px;border-bottom:1px solid var(--line);align-items:flex-start;}
.side-item:last-child{border:0;}
.side-rank{font-family:var(--serif);font-weight:800;font-size:22px;color:var(--crimson);width:26px;flex-shrink:0;}
.side-item-title{font-family:var(--sans);font-weight:600;font-size:13.5px;line-height:1.35;}
.ad-block{background:var(--paper-hi);border:1px dashed var(--line);padding:30px 12px;text-align:center;font-family:var(--ui);font-size:11px;color:#a19a89;letter-spacing:.08em;text-transform:uppercase;margin-bottom:32px;}

footer{background:var(--ink);color:#cfc9ba;padding:40px 0 24px;font-family:var(--ui);}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:24px;margin-bottom:24px;}
@media(max-width:700px){.footer-grid{grid-template-columns:1fr 1fr;}}
footer h4{color:#fff;font-size:13px;letter-spacing:.06em;text-transform:uppercase;margin:0 0 12px;}
footer a{display:block;font-size:13px;color:#a49d8c;margin-bottom:8px;}
footer a:hover{color:#fff;}
.footer-bottom{border-top:1px solid #3a362f;padding-top:16px;font-size:12px;color:#8a8474;text-align:center;}

/* ===== Article page ===== */
.breadcrumb{font-family:var(--ui);font-size:12px;color:var(--ink-soft);margin-bottom:18px;}
.breadcrumb a{color:var(--crimson);}
.article-head{max-width:760px;margin:0 auto 24px;}
.article-title{font-family:var(--serif);font-size:34px;line-height:1.22;font-weight:800;margin:12px 0 10px;}
.article-sub{font-family:var(--sans);font-size:17px;color:var(--ink-soft);margin-bottom:16px;}
.article-byline{display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-family:var(--ui);font-size:12.5px;color:var(--ink-soft);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px 0;}
.share-rail{display:flex;gap:8px;margin-left:auto;}
.share-btn{width:30px;height:30px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;}
.article-figure{max-width:820px;margin:0 auto 24px;}
.article-figure img{width:100%;}
figcaption{font-family:var(--ui);font-size:12px;color:#8a8478;padding-top:6px;}
.article-body{max-width:760px;margin:0 auto;font-size:16.5px;line-height:1.85;}
.article-body p{margin:0 0 18px;}
.font-ctrl{display:flex;gap:8px;align-items:center;font-family:var(--ui);font-size:12px;}
.font-ctrl button{border:1px solid var(--line);background:#fff;width:26px;height:26px;}
.tag-row{display:flex;gap:8px;flex-wrap:wrap;max-width:760px;margin:26px auto;}
.tag-pill{border:1px solid var(--line);padding:5px 11px;font-family:var(--ui);font-size:12px;border-radius:20px;color:var(--ink-soft);}
.related-grid{max-width:900px;margin:0 auto;}

/* ===== Admin ===== */
.admin-body{background:#F2F1ED;min-height:100vh;font-family:var(--ui);}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ink);}
.login-card{background:#fff;width:360px;padding:36px 32px;border-top:4px solid var(--crimson);}
.login-card .logo{font-size:28px;margin-bottom:2px;}
.login-card p{font-size:12.5px;color:#8a8478;margin:0 0 22px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:700;margin-bottom:6px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
.field input, .field select, .field textarea{
  width:100%;padding:9px 11px;border:1px solid #d3cebf;border-radius:3px;font-size:14px;background:#fff;
}
.field textarea{resize:vertical;font-family:var(--sans);}
.btn{border:0;padding:10px 18px;font-weight:700;font-size:13px;border-radius:3px;letter-spacing:.02em;}
.btn-primary{background:var(--crimson);color:#fff;}
.btn-primary:hover{background:var(--crimson-dark);}
.btn-dark{background:var(--ink);color:#fff;}
.btn-ghost{background:transparent;border:1px solid #cfc9ba;color:var(--ink);}
.btn-full{width:100%;}
.error-msg{background:#fbeaea;color:var(--crimson-dark);font-size:12.5px;padding:9px 11px;border-radius:3px;margin-bottom:14px;}

.admin-shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh;}
.admin-sidebar{background:var(--ink);color:#cfc9ba;padding:20px 0;}
.admin-sidebar .logo{font-size:22px;padding:0 20px 20px;border-bottom:1px solid #3a362f;margin-bottom:10px;color:#fff;}
.admin-nav a{display:flex;align-items:center;gap:10px;padding:11px 20px;font-size:13.5px;font-weight:600;color:#b9b3a6;}
.admin-nav a:hover,.admin-nav a.active{color:#fff;background:rgba(255,255,255,.06);border-left:3px solid var(--crimson);padding-left:17px;}
.admin-main{padding:26px 30px;overflow-x:auto;}
.admin-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.admin-topbar h1{font-family:var(--ui);font-size:21px;margin:0;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
@media(max-width:800px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:#fff;border:1px solid #e2ddd0;padding:16px;border-radius:4px;}
.stat-card .n{font-family:var(--serif);font-size:28px;font-weight:800;}
.stat-card .l{font-size:11.5px;color:#8a8478;text-transform:uppercase;letter-spacing:.05em;}
.panel{background:#fff;border:1px solid #e2ddd0;border-radius:4px;padding:20px;margin-bottom:20px;}
.panel h3{margin:0 0 14px;font-size:15px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 8px;background:#F6F4EE;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#8a8478;border-bottom:1px solid #e2ddd0;}
td{padding:10px 8px;border-bottom:1px solid #ecead F0;border-bottom:1px solid #efece2;vertical-align:middle;}
tr:hover td{background:#FBFAF6;}
.thumb-sm{width:56px;height:40px;object-fit:cover;border-radius:2px;}
.action-icons{display:flex;gap:8px;font-size:14px;}
.action-icons span{cursor:pointer;opacity:.75;}
.action-icons span:hover{opacity:1;}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.toolbar input,.toolbar select{padding:8px 10px;border:1px solid #d3cebf;border-radius:3px;font-size:13px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
@media(max-width:900px){.grid2,.grid3,.grid4{grid-template-columns:1fr 1fr;}}
.check-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:900px){.check-grid{grid-template-columns:1fr 1fr;}}
.check-item{display:flex;align-items:center;gap:8px;background:#F6F4EE;padding:9px 10px;border-radius:3px;font-size:13px;}
.tab-bar{display:flex;gap:2px;border-bottom:1px solid #e2ddd0;margin-bottom:20px;}
.tab-btn{padding:10px 16px;font-size:13px;font-weight:700;color:#8a8478;border-bottom:2px solid transparent;background:none;border-top:0;border-left:0;border-right:0;}
.tab-btn.active{color:var(--crimson);border-bottom-color:var(--crimson);}
.toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:13px 20px;border-radius:4px;font-size:13.5px;box-shadow:0 6px 18px rgba(0,0,0,.25);z-index:200;font-family:var(--ui);}
.cat-chip{display:inline-flex;align-items:center;gap:8px;background:#F6F4EE;border:1px solid #e2ddd0;padding:6px 10px;border-radius:20px;font-size:12.5px;margin:3px;}
.cat-dot{width:9px;height:9px;border-radius:50%;}
.helptext{font-size:11.5px;color:#a19a89;margin-top:4px;}
.demo-note{background:#FFF7E6;border:1px solid #f0deac;color:#7a5c14;font-size:12px;padding:10px 12px;border-radius:4px;margin-bottom:18px;}
</style>
</head>
<body>

<div id="app"></div>
<div id="toast-root"></div>

<script>
/* =========================================================================
   SATIKHABAR — Nepali news portal + CMS admin (single-file demo)
   All data lives in memory only (per the artifact sandbox: no localStorage).
   Refreshing the page resets everything back to the seed data below.
   ========================================================================= */

const ADMIN_USER = "admin";
const ADMIN_PASS = "satishsah@123";

const CATEGORIES = [
  {id:"home", name:"गृहपृष्ठ", icon:"🏠", color:"#1B1918"},
  {id:"taja", name:"ताजा खबर", icon:"🕒", color:"#A6192E"},
  {id:"breaking", name:"ब्रेकिङ न्यूज", icon:"🚨", color:"#A6192E"},
  {id:"rajniti", name:"राजनीति", icon:"🏛️", color:"#4A4642"},
  {id:"sthaniya", name:"स्थानीय", icon:"📍", color:"#2E6B4F"},
  {id:"madhesh", name:"मधेश प्रदेश", icon:"🌾", color:"#B8863B"},
  {id:"rastriya", name:"राष्ट्रिय", icon:"🇳🇵", color:"#A6192E"},
  {id:"antarrastriya", name:"अन्तर्राष्ट्रिय", icon:"🌐", color:"#274a70"},
  {id:"aparadh", name:"अपराध", icon:"🚔", color:"#7E1122"},
  {id:"arthatantra", name:"अर्थतन्त्र", icon:"📊", color:"#B8863B"},
  {id:"byapar", name:"व्यापार", icon:"💼", color:"#4A4642"},
  {id:"bank", name:"बैंक तथा वित्त", icon:"🏦", color:"#274a70"},
  {id:"share", name:"शेयर बजार", icon:"📈", color:"#2E6B4F"},
  {id:"krishi", name:"कृषि", icon:"🌱", color:"#2E6B4F"},
  {id:"shiksha", name:"शिक्षा", icon:"🎓", color:"#274a70"},
  {id:"swasthya", name:"स्वास्थ्य", icon:"⚕️", color:"#A6192E"},
  {id:"khelkud", name:"खेलकुद", icon:"🏆", color:"#B8863B"},
  {id:"manoranjan", name:"मनोरञ्जन", icon:"🎬", color:"#7E1122"},
  {id:"pravidhi", name:"प्रविधि", icon:"💻", color:"#274a70"},
  {id:"rojgar", name:"रोजगार", icon:"🧑‍💼", color:"#4A4642"},
  {id:"paryatan", name:"पर्यटन", icon:"🏔️", color:"#2E6B4F"},
  {id:"dharma", name:"धर्म / संस्कृति", icon:"🕉️", color:"#B8863B"},
  {id:"mausam", name:"मौसम", icon:"⛅", color:"#274a70"},
  {id:"bichar", name:"विचार", icon:"✍️", color:"#4A4642"},
  {id:"antarvarta", name:"अन्तर्वार्ता", icon:"🎙️", color:"#7E1122"},
  {id:"sampadakiya", name:"सम्पादकीय", icon:"📝", color:"#1B1918"},
  {id:"gallery", name:"फोटो ग्यालरी", icon:"🖼️", color:"#B8863B"},
  {id:"video", name:"भिडियो", icon:"🎥", color:"#7E1122"},
  {id:"live", name:"लाइभ", icon:"🔴", color:"#A6192E"},
  {id:"rashifal", name:"राशिफल", icon:"🔮", color:"#274a70"},
  {id:"suchana", name:"सूचना", icon:"📢", color:"#4A4642"},
  {id:"bigyapan", name:"विज्ञापन", icon:"📣", color:"#8a8478"},
  {id:"anya", name:"अन्य", icon:"➕", color:"#8a8478"},

function timeAgo(iso){
  const mins = Math.floor((Date.now()-new Date(iso))/60000);
  if(mins<60) return mins+" मिनेट अघि";
  const hrs = Math.floor(mins/60);
  if(hrs<24) return hrs+" घण्टा अघि";
  return Math.floor(hrs/24)+" दिन अघि";
}

const SITE_URL = "https://satikhabar.netlify.app";
const DEFAULT_OG_IMAGE = SITE_URL+"/og-image.jpg";

function absUrl(u){
  if(!u) return DEFAULT_OG_IMAGE;
  if(/^https?:\/\//i.test(u)) return u; // already absolute (e.g. picsum.photos link)
  return SITE_URL + (u.startsWith('/')?u:'/'+u);
}

function applySEOTags(n){
  const title = (n.seoTitle||n.title)+" | SatiKhabar";
  const desc = n.seoDesc||n.summary;
  const url = SITE_URL+"/#/article/"+n.id;
  const ogImg = absUrl(n.ogImage||n.featuredImage);
  document.title = title;
  const set = (sel,attr,val)=>{ let el=document.querySelector(sel); if(el) el.setAttribute(attr,val); };
  set('meta[name="description"]','content',desc);
  set('link[rel="canonical"]','href',url);
  set('meta[property="og:type"]','content','article');
  set('meta[property="og:title"]','content',n.seoTitle||n.title);
  set('meta[property="og:description"]','content',desc);
  set('meta[property="og:image"]','content',ogImg);
  set('meta[property="og:image:width"]','content','1200');
  set('meta[property="og:image:height"]','content','630');
  set('meta[property="og:url"]','content',url);
  set('meta[name="twitter:title"]','content',n.seoTitle||n.title);
  set('meta[name="twitter:description"]','content',desc);
  set('meta[name="twitter:image"]','content',ogImg);
  const ld = document.getElementById('jsonld-schema');
  ld.type = 'application/ld+json';
  ld.textContent = JSON.stringify({
    "@context":"https://schema.org","@type":"NewsArticle","headline":n.title,
    "image":[ogImg],"datePublished":n.publishDate,"dateModified":n.updatedDate||n.publishDate,
    "author":[{"@type":"Person","name":n.reporter}],"publisher":{"@type":"Organization","name":"SatiKhabar"},
    "description":desc,"mainEntityOfPage":url
  });
}
function shareArticle(platform, id){
  const n = NEWS.find(x=>x.id===id);
  const url = SITE_URL+"/#/article/"+id;
  const text = n?(n.seoTitle||n.title):"SatiKhabar";
  let shareUrl = "";
  if(platform==='facebook'){
    shareUrl = "https://www.facebook.com/sharer/sharer.php?u="+encodeURIComponent(url);
  } else if(platform==='whatsapp'){
    shareUrl = "https://wa.me/?text="+encodeURIComponent(text+" "+url);
  } else if(platform==='telegram'){
    shareUrl = "https://t.me/share/url?url="+encodeURIComponent(url)+"&text="+encodeURIComponent(text);
  } else if(platform==='copy'){
    if(navigator.clipboard){ navigator.clipboard.writeText(url); }
    showToast('लिङ्क कपी भयो');
    return;
  }
  window.open(shareUrl, "_blank", "noopener,noreferrer,width=600,height=500");
}

function toggleAll(checked){ state.selectedIds = new Set(checked ? NEWS.map(n=>n.id) : []); render(); }
function toggleSel(id,checked){ if(checked) state.selectedIds.add(id); else state.selectedIds.delete(id); render(); }
function bulkAction(action){
  if(!action) return;
  const ids = [...state.selectedIds];
  if(!ids.length){ showToast("पहिले समाचार छनोट गर्नुहोस्"); return; }
  if(action==="delete"){ NEWS = NEWS.filter(n=>!ids.includes(n.id)); showToast(ids.length+" समाचार मेटियो"); }
  else if(action==="publish"){ NEWS.forEach(n=>{if(ids.includes(n.id)) n.status="published";}); showToast("प्रकाशित गरियो"); }
  else if(action==="draft"){ NEWS.forEach(n=>{if(ids.includes(n.id)) n.status="draft";}); showToast("ड्राफ्टमा राखियो"); }
  else if(action==="breaking"){ NEWS.forEach(n=>{if(ids.includes(n.id)) n.breaking=true;}); showToast("ब्रेकिङ चिन्ह लगाइयो"); }
  else if(action==="featured"){ NEWS.forEach(n=>{if(ids.includes(n.id)) n.featured=true;}); showToast("फिचर चिन्ह लगाइयो"); }
  else if(action==="csv"){ exportCSV(NEWS.filter(n=>ids.includes(n.id))); showToast("CSV तयार गरियो"); }
  state.selectedIds = new Set();
  render();
}
function exportCSV(rows){
  const header = "id,title,category,status,reporter,province,views\n";
  const body = rows.map(n=>[n.id,`"${n.title.replace(/"/g,'')}"`,n.category,n.status,n.reporter,n.province,n.views].join(",")).join("\n");
  const blob = new Blob([header+body],{type:"text/csv"});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = "satikhabar-news-export.csv"; a.click();
}
function toggleFlag(id,flag){ const n=NEWS.find(x=>x.id===id); if(n){ n[flag]=!n[flag]; render(); } }
function deleteNews(id){ if(confirm("यो समाचार मेटाउने पक्का हो?")){ NEWS = NEWS.filter(n=>n.id!==id); render(); showToast("समाचार मेटियो"); } }
function duplicateNews(id){
  const n = NEWS.find(x=>x.id===id); if(!n) return;
  const copy = Object.assign({},n,{id:nextId++, title:n.title+" (प्रतिलिपि)", status:"draft", views:0});
  NEWS.unshift(copy); render(); showToast("प्रतिलिपि बनाइयो");
}

  <div class="field"><label>Meta Description</label><textarea rows="2" ${bindText('seoDesc')} placeholder="${esc(draft.summary)}">${esc(draft.seoDesc)}</textarea></div>
  <div class="grid3">
    <div class="field"><label>Focus Keyword</label><input type="text" value="${esc(draft.focusKeyword)}" ${bindText('focusKeyword')}></div>
    <div class="field"><label>Slug</label><input type="text" value="${esc(draft.slug)}" ${bindText('slug')} placeholder="news-title-slug"></div>
    <div class="field"><label>SEO Score</label><input type="text" disabled value="${seoScore()}/100"></div>
  </div>
  <div class="grid2">
    <div class="field"><label>Canonical URL</label><input type="text" value="${esc(draft.canonical)}" ${bindText('canonical')} placeholder="https://satikhabar.com/news/example"></div>
    <div class="field"><label>Open Graph Image</label><input type="text" value="${esc(draft.ogImage)}" ${bindText('ogImage')} placeholder="${esc(draft.featuredImage)}"></div>
  </div>
  <div class="helptext">प्रकाशित हुनासाथ Open Graph Tags, Twitter Card, Canonical URL र JSON-LD NewsArticle Schema स्वतः खबर पेजमा लागू हुन्छन्।</div>`;
}
function seoScore(){
  let s=40;
  if(draft.title) s+=15; if(draft.seoDesc||draft.summary) s+=15;
  if(draft.slug) s+=10; if(draft.focusKeyword) s+=10; if(draft.featuredImage) s+=10;
  return Math.min(100,s);
}
function esc(s){ return (s||"").toString().replace(/"/g,'&quot;'); }

function saveDraft(statusOverride){
  if(!draft.title.trim()){ showToast("शीर्षक अनिवार्य छ"); state.formTab='basic'; render(); return; }
  const tagsArr = draft.tags.split(",").map(t=>t.trim()).filter(Boolean);
  const galleryArr = draft.gallery.split(",").map(t=>t.trim()).filter(Boolean);
  const payload = Object.assign({}, draft, {
    status: statusOverride||draft.status, tags: tagsArr, gallery: galleryArr,
    featuredImage: draft.featuredImage || img("news"+(draft.id||nextId)),
    slug: draft.slug || ("news-"+(draft.id||nextId)),
    updatedDate: new Date().toISOString(),
  });
  if(draft.id){
    const idx = NEWS.findIndex(n=>n.id===draft.id);
    NEWS[idx] = Object.assign({}, NEWS[idx], payload);
    showToast("समाचार अपडेट भयो");
  } else {
    const id = nextId++;
    NEWS.unshift(mkNews(Object.assign({}, payload, {id, publishDate:new Date().toISOString(), views:0})));
    showToast(statusOverride==='published'?"समाचार प्रकाशित भयो":"ड्राफ्ट सेभ भयो");
  }
  draft = blankDraft(); state.editId = null;
  go('admin-dashboard');
}
function previewDraft(){
  if(!draft.title.trim()){ showToast("पहिले शीर्षक लेख्नुहोस्"); return; }
  const tempId = -999;
  NEWS = NEWS.filter(n=>n.id!==tempId);
  const tagsArr = draft.tags.split(",").map(t=>t.trim()).filter(Boolean);
  NEWS.push(mkNews(Object.assign({},draft,{id:tempId,tags:tagsArr,featuredImage:draft.featuredImage||img('preview'),publishDate:new Date().toISOString(),views:0,status:'published'})));
  go('article',{articleId:tempId});
}

/* ---------- Category management ---------- */
function renderCategories(){
  return `
  <div class="admin-topbar"><h1>श्रेणी व्यवस्थापन</h1></div>
  <div class="panel">
    <h3>सबै श्रेणीहरू (Create · Edit · Delete · Hide · Reorder)</h3>
    <div>${CATEGORIES.map(c=>`
      <span class="cat-chip"><span class="cat-dot" style="background:${c.color}"></span>${c.icon} ${c.name}
        <span style="opacity:.5;cursor:pointer" title="Hide">🙈</span>
        <span style="opacity:.5;cursor:pointer" title="Edit">✏️</span>
      </span>`).join("")}
    </div>
    <div class="helptext" style="margin-top:14px">नयाँ श्रेणी थप्न तल फारम भर्नुहोस्। यो डेमो सत्रको लागि मात्र मेमोरीमा रहन्छ।</div>
    <div class="grid3" style="margin-top:10px">
      <div class="field"><label>Category Name</label><input id="newCatName" type="text" placeholder="नयाँ श्रेणी नाम"></div>
      <div class="field"><label>Icon (emoji)</label><input id="newCatIcon" type="text" placeholder="🆕"></div>
      <div class="field"><label>Color</label><input id="newCatColor" type="color" value="#A6192E"></div>
    </div>
    <button class="btn btn-primary" onclick="addCategory()">➕ श्रेणी थप्नुहोस्</button>
  </div>`;
}
function addCategory(){
  const name = document.getElementById('newCatName').value.trim();
  if(!name){ showToast("श्रेणीको नाम लेख्नुहोस्"); return; }
  const icon = document.getElementById('newCatIcon').value.trim()||"🆕";
  const color = document.getElementById('newCatColor').value;
  CATEGORIES.push({id:"cat"+Date.now(), name, icon, color});
  render(); showToast("श्रेणी थपियो");
}

/* =========================================================================
   ROUTER
   ========================================================================= */
function parseHash(){
  const h = location.hash.replace(/^#\/?/,'');
  const parts = h.split('/').filter(Boolean);
  if(parts.length===0) return {route:'home'};
  if(parts[0]==='article') return {route:'article', articleId: parseInt(parts[1])};
  if(parts[0]==='category') return {route:'category', catId: parts[1]};
  if(parts[0]==='admin') return {route:'admin'};
  if(parts[0]==='admin-dashboard') return {route:'admin-dashboard'};
  if(parts[0]==='admin-create') return {route:'admin-create'};
  if(parts[0]==='admin-categories') return {route:'admin-categories'};
  return {route:'home'};
}

window.addEventListener('hashchange', ()=>{ Object.assign(state, parseHash()); render(); window.scrollTo(0,0); });

function render(){
  const app = document.getElementById('app');
  const r = state.route;

  if(r==='admin' || r.startsWith('admin-')){
    if(!state.isAdmin){
      app.innerHTML = renderAdminLogin();
      return;
    }
    if(r==='admin'){ state.route='admin-dashboard'; }
    let body = "";
    if(state.route==='admin-dashboard') body = renderDashboard();
    else if(state.route==='admin-create') body = renderCreate();
    else if(state.route==='admin-categories') body = renderCategories();
    app.innerHTML = `<div class="admin-body"><div class="admin-shell">${adminSidebar()}<main class="admin-main">${body}</main></div></div>`;
    return;
  }

  resetSEOTags();
  let body = "";
  if(r==='home') body = renderHome();
  else if(r==='category') body = renderCategory(state.catId);
  else if(r==='article') body = renderArticle(state.articleId);
  else body = renderHome();

  app.innerHTML = `${renderTicker()}${renderMasthead()}${body}${renderFooter()}`;
}
function renderInto(){ render(); } // used by search input debounce-less rebind

Object.assign(state, parseHash());
render();
</script>
